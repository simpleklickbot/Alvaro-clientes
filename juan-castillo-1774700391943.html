<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoría Inteligente — Juan Castillo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0c10;--sf:#10131a;--sf2:#161b25;
  --br:rgba(255,255,255,0.07);--tx:#f0f2f7;--mu:#8892a4;
  --ac:#00d4aa;--a2:#0098ff;--dn:#ff4b6e;--wn:#ffb400;
  --fh:'Bricolage Grotesque',sans-serif;--fb:'DM Sans',sans-serif;--r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:900px;margin:0 auto;padding:0 20px}
.rv{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.rv.vis{opacity:1;transform:none}
.d1{transition-delay:.07s}.d2{transition-delay:.14s}.d3{transition-delay:.21s}
.hdr{background:var(--bg) !important;border-bottom:1px solid var(--br);position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(0,212,170,.06),transparent 65%);pointer-events:none}
.hdr-in{position:relative;z-index:1;padding:44px 20px 40px;max-width:900px;margin:0 auto}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:10px}
.logo{font-family:var(--fh);font-weight:800;font-size:.9rem;color:rgba(255,255,255,.4);letter-spacing:.04em}
.logo span{color:var(--ac)}
.hdr-date{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu)}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.22);color:var(--ac);font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 13px;border-radius:40px;margin-bottom:18px}
h1{font-family:var(--fh);font-weight:800;font-size:clamp(2rem,5vw,3.2rem);line-height:1.06;letter-spacing:-.03em;color:var(--tx);margin-bottom:8px}
h1
